name: Gist Provider Suggestion
description: Suggest a plugin, mod, or datapack for the provider Gist.
title: "[Gist Suggestion]: "
labels:
  - gist-suggestion
body:
  - type: markdown
    attributes:
      value: |
        Add your suggestion payload below.

        The importer searches the issue text and reads the first valid JSON object it finds.
        No ```json fence is required.

        Imported top-level keys:
        - plugins
        - mods
        - datapacks

        Ignored top-level keys:
        - resourcepacks
        - anything else

  - type: textarea
    id: suggestion_payload
    attributes:
      label: Suggestion payload
      description: Text above/below the JSON is ignored.
      value: |
        New gist suggestion submitted from the Minecraft Panel settings.

        Requested by: admin
        Target gist: https://gist.github.com/surgamingoninsulin/2b4d90991a5a5a025f69cce2282f67b7

        Suggestion payload:

        {
          "plugins": [
            {
              "id": "example-plugin",
              "name": "Example Plugin",
              "author": "Example Author",
              "minecraftVersion": "1.21.11",
              "version": "1.0.0",
              "image": "https://example.com/logo.png",
              "directDownloadUrl": "https://example.com/download.jar",
              "description": "Example description",
              "websiteUrl": "https://example.com",
              "dependencies": []
            }
          ]
        }
    validations:
      required: true
