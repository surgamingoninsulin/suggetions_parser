name: Apply Gist Suggestions

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  issues:
    types:
      - labeled
      - edited
      - opened
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply approved suggestions to Gist
        env:
          GITHUB_ISSUE_TOKEN: ${{ secrets.ISSUE_TOKEN }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          ISSUE_SOURCE_REPO: surgamingoninsulin/Minecraft-Control-Panel
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_FILENAME: GithubDatapacksPluginsMods.json
          ISSUE_TITLE_PREFIX: "[Gist Suggestion]"
        run: python src/gist_suggestions/apply_gist_suggestions.py


        
